version: "3.9"

# CryptoStream — full local real-time data platform.
# Everything here runs free on your laptop. `docker compose up -d` starts the stack.

services:
  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible broker (lighter than Kafka for local dev)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    container_name: cs-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redpanda Console — nice UI to inspect topics/messages (great for demos)
  console:
    image: redpandadata/console:v2.6.0
    container_name: cs-console
    depends_on:
      - redpanda
    ports:
      - "8085:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store used as the raw data lake
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: cs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Create the lake bucket on startup
  minio-setup:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: cs-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}) do echo 'waiting for minio'; sleep 2; done;
      mc mb --ignore-existing local/${LAKE_BUCKET:-crypto-lake};
      echo 'bucket ready';
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # Ingestion — Binance WebSocket → Redpanda
  # ---------------------------------------------------------------------------
  ingestion:
    build: ./ingestion
    container_name: cs-ingestion
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: redpanda:29092
      SYMBOLS: ${SYMBOLS:-btcusdt,ethusdt,solusdt}
      TRADES_TOPIC: ${TRADES_TOPIC:-crypto.trades}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Spark Structured Streaming — feature computation + write to lake
  # ---------------------------------------------------------------------------
  spark:
    build: ./streaming
    container_name: cs-spark
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: redpanda:29092
      TRADES_TOPIC: ${TRADES_TOPIC:-crypto.trades}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      LAKE_BUCKET: ${LAKE_BUCKET:-crypto-lake}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLflow — experiment tracking + model registry
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: cs-mlflow
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  # ---------------------------------------------------------------------------
  # FastAPI — model serving
  # ---------------------------------------------------------------------------
  api:
    build: ./ml
    container_name: cs-api
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      LAKE_ROOT: /data/warehouse
    ports:
      - "8000:8000"
    volumes:
      - warehouse-data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit — live dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: cs-dashboard
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      LAKE_ROOT: /data/warehouse
    ports:
      - "8501:8501"
    volumes:
      - warehouse-data:/data
    restart: unless-stopped

volumes:
  minio-data:
  mlflow-data:
  warehouse-data:
